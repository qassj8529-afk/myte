<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Finance Studio Pro - Pure JSON Renderer</title>

  <!-- Google Fonts: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Main Styles -->
  <link rel="stylesheet" href="css/main.css">
</head>

<body>

  <!-- Animated Gradient Background -->
  <div class="bg-gradient"></div>

  <!-- SLIDER WRAPPER -->
  <div id="slider-wrapper">
    <!-- SLIDE 1: START SCREEN -->
    <div class="slide slide-active" id="slide-start">
      <div class="glass-panel central-panel" style="max-width: 800px;">
        <h1>Finance Studio Pro</h1>
        <p class="subtitle">Pure JSON Blueprint Renderer</p>

        <label
          style="display:block; text-align:left; color: var(--text-secondary); margin-bottom: 0.5rem; font-size: 0.85rem; text-transform: uppercase; margin-top: 1rem;">Dashboard
          JSON Input</label>
        <textarea id="script-input" placeholder='{
  "ticker": "AAPL",
  "companyName": "Apple Inc."
}'></textarea>

        <button id="btn-generate" style="margin-top: 1rem;">Generate Dashboard</button>

        <div class="director-legend">
          <h3>Director Controls</h3>
          <ul>
            <li><strong>→ / ←</strong> : Switch Slides</li>
            <li><strong>H / B / C / R</strong> : Highlight / Box / Focus / Reset (Slide only)</li>
            <li><strong>Z</strong> : Toggle Magnifier (Slide only)</li>
            <li><strong>D</strong> : Debug Overlay</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- PAGE INDICATOR -->
  <div id="page-indicator" class="hidden">Slide 1 / 1</div>

  <!-- MAGNIFIER OVERLAY LENS -->
  <div id="magnifier-lens" class="hidden"></div>

  <!-- DEBUG CONSOLE OVERLAY -->
  <div id="debug-console" class="hidden">
    <div class="debug-header">Debug State <span style="float:right; cursor:pointer;"
        onclick="document.getElementById('debug-console').classList.add('hidden')">X</span></div>
    <div id="debug-logs"></div>
  </div>

  <!-- External Libraries -->
  <!-- No lightweight-charts needed, we use iframe -->

  <!-- Core Engine -->
  <script src="js/core/app.js" defer></script>
  <script src="js/core/navigation.js" defer></script>
  <script src="js/renderer.js" defer></script>

  <!-- Director Tools -->
  <script src="js/tools/magnifier.js" defer></script>
  <script src="js/tools/directorTools.js" defer></script>
  <script src="js/tools/newsScreenshots.js" defer></script>
  <script src="js/tools/debug.js" defer></script>

</body>

</html>
